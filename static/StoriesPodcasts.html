<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winvestor — Stories & Podcasts</title>
<script>if (!localStorage.getItem('apex-theme')) localStorage.setItem('apex-theme', 'dark');</script>
<script src="/static/js/theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Space+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { --bg: #05060f; --text: #e2e8f4; --muted: rgba(160,170,200,0.7); --accent: #34d399; }
[data-theme="light"] { --bg: #f5f6fa; --text: #1a1d2e; --muted: rgba(60,70,100,0.65); }

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; transition: background 0.3s;
}

.badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); border: 1px solid rgba(52,211,153,0.25);
  border-radius: 4px; padding: 5px 12px; margin-bottom: 28px;
}
h1 {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: clamp(32px, 6vw, 56px); letter-spacing: -0.03em;
  line-height: 1.05; text-align: center; margin-bottom: 16px;
}
h1 span { color: var(--accent); }
p { font-size: 15px; color: var(--muted); text-align: center; max-width: 400px; line-height: 1.7; margin-bottom: 40px; }

a.back {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
  color: var(--accent); text-decoration: none;
  border: 1px solid rgba(52,211,153,0.3); border-radius: 8px; padding: 10px 24px;
  transition: background 0.2s, border-color 0.2s;
}
a.back:hover { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.6); }

.glow {
  position: fixed; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
}

.theme-btn {
  position: fixed; top: 24px; right: 28px; z-index: 100;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
  color: var(--text); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; backdrop-filter: blur(8px);
}
[data-theme="light"] .theme-btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); }
</style>
</head>
<body>
<div class="glow"></div>
<button class="theme-btn" id="themeToggle" onclick="toggleApexTheme()" title="Toggle light/dark mode">☀</button>
<div class="badge">Coming Soon</div>
<h1>Stories &amp;<br><span>Podcasts</span></h1>
<p>Videos, blogs, and podcast episodes about the founder's trading experiences are on their way. Check back soon.</p>
<a href="/" class="back">← Back to Home</a>
</body>
</html>
