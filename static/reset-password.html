<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Growth Capital Academy</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>
  var _t = localStorage.getItem('gca-theme') || 'light';
  document.documentElement.setAttribute('data-theme', _t);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #060812;
  --bg2:     #090c18;
  --bg3:     #0d1020;
  --border:  rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.16);
  --text:    #e8eaf6;
  --muted:   #8892b0;
  --green:   #00d4aa;
  --green2:  #00b891;
  --input-bg: rgba(255,255,255,0.05);
  --input-border: rgba(255,255,255,0.10);
  --input-focus: rgba(0,212,170,0.40);
  --card-bg: rgba(13,16,32,0.90);
}

[data-theme="light"] {
  --bg:      #f5f7ff;
  --bg2:     #edf0fa;
  --bg3:     #e4e8f5;
  --border:  rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text:    #1a1d2e;
  --muted:   #556080;
  --green:   #00a882;
  --green2:  #008f6e;
  --input-bg: rgba(255,255,255,0.80);
  --input-border: rgba(0,0,0,0.14);
  --input-focus: rgba(0,168,130,0.40);
  --card-bg: rgba(255,255,255,0.92);
}

html, body {
  min-height: 100%;
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
[data-theme="light"] body::before {
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
}

body::after {
  content: '';
  position: fixed;
  top: -10%;
  left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(0,212,170,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 44px 44px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.25),
    0 0 60px rgba(0,212,170,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo { text-align: center; margin-bottom: 12px; }
.logo a { display: block; }
.logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; text-align: center; margin-bottom: 28px; }

.card-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); text-align: center; margin-bottom: 8px; }
.card-desc { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; line-height: 1.6; }

.field { margin-bottom: 16px; }
.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
  display: block;
}
.field input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 8px;
  padding: 11px 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input::placeholder { color: var(--muted); opacity: 0.6; }
.field input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--input-focus);
}

.submit-btn {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #03130f;
  border: none;
  border-radius: 9px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  box-shadow: 0 0 30px rgba(0,212,170,0.20);
  margin-top: 6px;
}
.submit-btn:hover { background: var(--green2); box-shadow: 0 0 40px rgba(0,212,170,0.35); transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.msg {
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.msg.error { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
.msg.success { background: rgba(0,212,170,0.10); border: 1px solid rgba(0,212,170,0.25); color: var(--green); }

.back {
  text-align: center;
  margin-top: 22px;
  font-size: 13px;
  color: var(--muted);
}
.back a { color: var(--green); text-decoration: none; font-weight: 600; }
.back a:hover { text-decoration: underline; }

.theme-row { position: fixed; top: 20px; right: 24px; z-index: 10; }
.theme-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--card-bg);
  color: var(--muted);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  backdrop-filter: blur(8px);
}
.theme-btn:hover { background: var(--bg3); color: var(--text); }
</style>
</head>
<body>

<div class="theme-row">
  <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
</div>

<div class="page">
  <div class="card">

    <div class="logo">
      <a href="/"><img src="/static/logos/GCA Simple Logo.svg" alt="Growth Capital Academy" style="height:44px;width:auto;border-radius:10px;display:block;margin:0 auto;"></a>
    </div>
    <div class="logo-sub">Your Investing Education Hub</div>

    <div id="resetFormWrap">
      <div class="card-title">Set a New Password</div>
      <div class="card-desc">Choose a new password for your account.</div>
      <div class="msg error" id="resetError"></div>
      <div class="field">
        <label class="field-label" for="newPassword">New password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="field" style="margin-bottom:22px;">
        <label class="field-label" for="confirmPassword">Confirm new password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password"
               onkeydown="if(event.key==='Enter') doReset()">
      </div>
      <button class="submit-btn" id="resetBtn" onclick="doReset()">Reset Password</button>
    </div>

    <div id="resetSuccessWrap" style="display:none;">
      <div class="msg success" style="display:block;">Your password has been reset. You can now sign in with your new password.</div>
      <a href="/login" class="submit-btn" style="display:block;text-align:center;text-decoration:none;line-height:1.4;">Go to Sign In</a>
    </div>

    <div id="resetInvalidWrap" style="display:none;">
      <div class="msg error" style="display:block;">This reset link is invalid or has expired.</div>
      <a href="/login" class="submit-btn" style="display:block;text-align:center;text-decoration:none;line-height:1.4;">Back to Sign In</a>
    </div>

    <div class="back">← <a href="/">Back to homepage</a></div>
  </div>
</div>

<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('gca-theme', next);
  document.getElementById('themeToggle').textContent = next === 'light' ? '🌙' : '☀️';
}
document.getElementById('themeToggle').textContent =
  (document.documentElement.getAttribute('data-theme') === 'dark') ? '☀️' : '🌙';

const params  = new URLSearchParams(window.location.search);
const resetUser  = params.get('u') || '';
const resetToken = params.get('t') || '';

if (!resetUser || !resetToken) {
  document.getElementById('resetFormWrap').style.display = 'none';
  document.getElementById('resetInvalidWrap').style.display = '';
}

function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }

async function doReset() {
  const btn      = document.getElementById('resetBtn');
  const pw       = document.getElementById('newPassword').value;
  const confirm  = document.getElementById('confirmPassword').value;
  const errEl    = document.getElementById('resetError');

  errEl.style.display = 'none';
  if (!pw || pw.length < 6) { showError(errEl, 'Password must be at least 6 characters.'); return; }
  if (pw !== confirm)       { showError(errEl, 'Passwords do not match.'); return; }

  btn.disabled = true; btn.textContent = 'Resetting…';
  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: resetUser, token: resetToken, new_password: pw }),
    });
    const data = await res.json();
    if (!res.ok) {
      showError(errEl, data.error || 'Could not reset password.');
      btn.disabled = false; btn.textContent = 'Reset Password';
      return;
    }
    document.getElementById('resetFormWrap').style.display = 'none';
    document.getElementById('resetSuccessWrap').style.display = '';
  } catch {
    showError(errEl, 'Cannot reach server — please try again.');
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
