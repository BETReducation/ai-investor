<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Trader — Stories & Podcasts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Space+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #05060f; color: #e2e8f4; font-family: 'Space Grotesk', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #34d399;
  border: 1px solid rgba(52,211,153,0.25);
  border-radius: 4px;
  padding: 5px 12px;
  margin-bottom: 28px;
}

h1 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: clamp(32px, 6vw, 56px);
  letter-spacing: -0.03em;
  line-height: 1.05;
  text-align: center;
  margin-bottom: 16px;
}

h1 span { color: #34d399; }

p {
  font-size: 15px;
  color: rgba(160,170,200,0.7);
  text-align: center;
  max-width: 400px;
  line-height: 1.7;
  margin-bottom: 40px;
}

a.back {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: #34d399;
  text-decoration: none;
  border: 1px solid rgba(52,211,153,0.3);
  border-radius: 8px;
  padding: 10px 24px;
  transition: background 0.2s, border-color 0.2s;
}
a.back:hover { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.6); }

.glow {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="badge">Coming Soon</div>
<h1>Stories &amp;<br><span>Podcasts</span></h1>
<p>Videos, blogs, and podcast episodes about the founder's trading experiences are on their way. Check back soon.</p>
<a href="/" class="back">← Back to Home</a>
</body>
</html>
