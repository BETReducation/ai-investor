<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="400" height="120" rx="16" fill="#0F0B1E"/>

  <!-- Chart area fill -->
  <polygon points="20,90 20,75 40,65 60,70 80,50 100,40 115,30 115,90" fill="url(#chartGrad)"/>

  <!-- Chart line -->
  <polyline points="20,75 40,65 60,70 80,50 100,40 115,30"
    fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Dot at peak -->
  <circle cx="115" cy="30" r="4" fill="#10B981" filter="url(#glow)"/>

  <!-- Vertical separator -->
  <line x1="138" y1="20" x2="138" y2="100" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.4"/>

  <!-- W I N V E S T O R text -->
  <text x="155" y="72" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800"
    letter-spacing="-1" fill="url(#wGrad)">WINVESTOR</text>

  <!-- Tagline -->
  <text x="157" y="92" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400"
    letter-spacing="4" fill="#9CA3AF">AI · TRADING · INTELLIGENCE</text>
</svg>
