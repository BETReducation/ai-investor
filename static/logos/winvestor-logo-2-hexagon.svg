<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#06D6A0"/>
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="60%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <filter id="hexGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="120" rx="16" fill="#080614"/>

  <!-- Hexagon icon -->
  <polygon points="60,15 85,28 85,58 60,71 35,58 35,28"
    fill="none" stroke="url(#hexGrad)" stroke-width="2.5" filter="url(#hexGlow)"/>

  <!-- Inner W shape inside hex -->
  <polyline points="45,52 52,35 60,48 68,35 75,52"
    fill="none" stroke="url(#hexGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#hexGlow)"/>

  <!-- Upward arrow tip -->
  <polyline points="55,38 60,28 65,38"
    fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main wordmark -->
  <text x="105" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700"
    letter-spacing="1" fill="url(#textGrad2)">WINVESTOR</text>

  <!-- Sub-text -->
  <text x="107" y="82" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="300"
    letter-spacing="5" fill="#6B7280">INTELLIGENT INVESTING</text>
</svg>
