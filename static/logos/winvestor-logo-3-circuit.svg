<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="tGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#6EE7B7"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="420" height="120" rx="0" fill="#050810"/>

  <!-- Circuit board trace lines -->
  <g stroke="#1E1B4B" stroke-width="1" fill="none">
    <line x1="0" y1="30" x2="420" y2="30"/>
    <line x1="0" y1="90" x2="420" y2="90"/>
    <line x1="30" y1="0" x2="30" y2="120"/>
    <line x1="390" y1="0" x2="390" y2="120"/>
  </g>

  <!-- Glowing circuit traces behind logo -->
  <g stroke="#7C3AED" stroke-width="1" fill="none" opacity="0.3" filter="url(#neon)">
    <polyline points="0,60 15,60 15,45 25,45"/>
    <polyline points="420,60 405,60 405,75 395,75"/>
    <line x1="140" y1="0" x2="140" y2="20"/>
    <line x1="280" y1="120" x2="280" y2="100"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#10B981" filter="url(#neon)">
    <circle cx="15" cy="45" r="2.5"/>
    <circle cx="405" cy="75" r="2.5"/>
    <circle cx="140" cy="20" r="2.5"/>
    <circle cx="280" cy="100" r="2.5"/>
  </g>

  <!-- Big W icon — bold geometric -->
  <g transform="translate(18, 18)">
    <polyline points="8,8 20,62 34,30 48,62 60,8"
      fill="none" stroke="url(#cGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
      filter="url(#neon)"/>
    <!-- Rising arrow integrated into W peak -->
    <line x1="34" y1="30" x2="34" y2="4" stroke="#10B981" stroke-width="3" stroke-linecap="round" filter="url(#neon)"/>
    <polyline points="28,10 34,3 40,10" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)"/>
  </g>

  <!-- Wordmark -->
  <text x="103" y="65" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="900"
    letter-spacing="-1" fill="url(#tGrad3)">WINVESTOR</text>

  <!-- Bottom tag -->
  <text x="105" y="84" font-family="'Courier New', monospace" font-size="9" letter-spacing="3" fill="#4B5563">
    &lt; AI MARKET INTELLIGENCE /&gt;
  </text>
</svg>
