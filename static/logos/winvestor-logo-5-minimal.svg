<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="wGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="text5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E9D5FF"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="420" height="120" rx="12" fill="url(#bg5)"/>

  <!-- Subtle grid -->
  <g stroke="#FFFFFF" stroke-width="0.4" opacity="0.04">
    <line x1="0" y1="40" x2="420" y2="40"/>
    <line x1="0" y1="80" x2="420" y2="80"/>
    <line x1="105" y1="0" x2="105" y2="120"/>
    <line x1="210" y1="0" x2="210" y2="120"/>
    <line x1="315" y1="0" x2="315" y2="120"/>
  </g>

  <!-- Large bold W — the centrepiece icon -->
  <g transform="translate(14, 10)" filter="url(#glow5)">
    <!-- W strokes -->
    <polyline points="10,10 24,80 40,42 56,80 70,10"
      fill="none" stroke="url(#wGrad5)" stroke-width="9"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner spark / highlight -->
    <polyline points="24,80 40,42 56,80"
      fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.25"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Thin vertical rule -->
  <line x1="106" y1="18" x2="106" y2="102" stroke="url(#wGrad5)" stroke-width="1.5" opacity="0.5"/>

  <!-- INVESTÖR wordmark beside the W -->
  <text x="122" y="54" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="300" letter-spacing="10" fill="#6B7280">INVESTÖR</text>

  <text x="120" y="82" font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="900" letter-spacing="0" fill="url(#text5)">WIN</text>

  <!-- Decorative dot -->
  <circle cx="169" cy="74" r="4" fill="#10B981" filter="url(#glow5)"/>

  <!-- Version tag -->
  <text x="366" y="108" font-family="'Courier New', monospace" font-size="8"
    letter-spacing="1" fill="#374151">v2.0</text>
</svg>
