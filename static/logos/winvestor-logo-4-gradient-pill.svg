<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="pillBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E1065"/>
      <stop offset="100%" style="stop-color:#064E3B"/>
    </linearGradient>
    <linearGradient id="iconGrad4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="stroke4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer rounded rectangle with gradient fill -->
  <rect width="420" height="120" rx="60" fill="url(#pillBg)"/>

  <!-- Glowing border -->
  <rect x="1.5" y="1.5" width="417" height="117" rx="59" fill="none"
    stroke="url(#stroke4)" stroke-width="1.5" opacity="0.6"/>

  <!-- Icon: stylised candlestick / W hybrid -->
  <g transform="translate(38, 22)" filter="url(#softglow)">
    <!-- Candle bodies -->
    <rect x="0" y="28" width="10" height="20" rx="2" fill="#10B981"/>
    <rect x="18" y="14" width="10" height="34" rx="2" fill="#7C3AED"/>
    <rect x="36" y="20" width="10" height="28" rx="2" fill="#10B981"/>
    <!-- Wicks -->
    <line x1="5" y1="20" x2="5" y2="28" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="48" x2="5" y2="56" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    <line x1="23" y1="6" x2="23" y2="14" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
    <line x1="23" y1="48" x2="23" y2="58" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
    <line x1="41" y1="12" x2="41" y2="20" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    <line x1="41" y1="48" x2="41" y2="60" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    <!-- Trend arrow -->
    <polyline points="2,52 14,36 32,42 44,18" fill="none" stroke="#34D399" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="38,14 44,18 40,24" fill="none" stroke="#34D399" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="112" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800"
    letter-spacing="2" fill="#FFFFFF">WIN<tspan fill="#34D399">VESTOR</tspan></text>

  <!-- Tagline -->
  <text x="114" y="80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="300"
    letter-spacing="4.5" fill="#9CA3AF">SMARTER · FASTER · RICHER</text>
</svg>
